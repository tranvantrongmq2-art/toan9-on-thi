<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ôn Thi Toán Lớp 9 - Tuyển sinh Lớp 10</title>
  <meta name="description" content="Hệ thống ôn tập trắc nghiệm Toán lớp 9 chuẩn bị thi tuyển sinh lớp 10">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- MathJax - render công thức toán -->
  <script>
    window.MathJax = { tex: { inlineMath: [['$','$'],['\\(','\\)']] } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">📐</div>
      <div class="logo-text">
        <span class="logo-tagline">Ôn thi tuyển sinh với Thầy Trong !!!</span>
      </div>
    </a>
    <nav class="nav">
      <a href="index.html" class="active"><span class="nav-emoji">🏠</span><span class="nav-label"> Làm bài</span></a>
      <a href="rank.html"><span class="nav-emoji">🏆</span><span class="nav-label"> Xếp hạng</span></a>
      <!-- Nút Upload chỉ hiện với thầy đã đăng nhập -->
      <a href="upload.html" id="navUpload" style="display:none;"><span class="nav-emoji">📤</span><span class="nav-label"> Upload đề</span></a>
    </nav>
  </div>
</header>
<script>
  // Hiện nút Upload nếu thầy đã xác thực trong phiên này
  if (sessionStorage.getItem('teacher_auth') === '1') {
    document.getElementById('navUpload').style.display = '';
  }
</script>
<!-- ===== BANNER CHÀO MỸ QUÝ ===== -->
<div class="mq-banner" id="mqBanner">
  <div class="mq-banner-inner">
    <div class="mq-banner-stars">⭐✨🌟💫⭐</div>
    <div class="mq-banner-title">CHÀO CÁC CHIẾN BINH MỸ QUÝ!</div>
    <div class="mq-banner-msg">
      Đừng học vì điểm số, hãy học để sau này bố mẹ bớt vất vả.<br>
      <span style="color:#fde68a;font-weight:700;">Thầy luôn ở đây đồng hành cùng các em! 💪</span>
    </div>
    <button class="mq-banner-close" onclick="document.getElementById('mqBanner').style.display='none'">✕ Đóng</button>
  </div>
</div>

<!-- ===== MAIN CONTENT ===== -->
<main class="main">
  <!-- App container - JS sẽ render vào đây -->
  <div id="app"></div>
</main>

<!-- ===== TOAST CONTAINER ===== -->
<div id="toastContainer" class="toast-container"></div>

<!-- ===== SCRIPTS ===== -->
<script src="app.js"></script>

</body>
</html>
