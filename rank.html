<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Xếp Hạng - Ôn Thi Toán 9</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    .rk-header{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border-radius:16px;padding:18px 22px 14px;margin-bottom:14px;text-align:center;}
    .rk-header h1{font-size:1.35rem;font-weight:900;margin:0 0 3px;}
    .rk-header p{font-size:.8rem;opacity:.8;margin:0;}
    .rk-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    @media(max-width:520px){.rk-stats{grid-template-columns:repeat(2,1fr);}}
    .rk-stat{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;text-align:center;}
    .rk-stat-num{font-size:1.3rem;font-weight:900;color:var(--primary);}
    .rk-stat-lbl{font-size:.70rem;color:var(--text-muted);margin-top:2px;}
    .rk-tbtn{padding:5px 13px;border-radius:99px;font-size:.76rem;font-weight:700;border:1.5px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .15s;}
    .rk-tbtn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .rk-podium{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin-bottom:16px;}
    .rk-slot{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s;}
    .rk-slot:hover{transform:translateY(-4px);}
    .rk-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;}
    .rk-s1 .rk-av{width:60px;height:60px;font-size:1.4rem;background:linear-gradient(135deg,#f59e0b,#fbbf24);box-shadow:0 4px 16px rgba(251,191,36,.45);}
    .rk-s2 .rk-av{width:48px;height:48px;font-size:1.15rem;background:linear-gradient(135deg,#64748b,#94a3b8);}
    .rk-s3 .rk-av{width:44px;height:44px;font-size:1.05rem;background:linear-gradient(135deg,#b45309,#d97706);}
    .rk-sname{font-size:.76rem;font-weight:700;margin-top:5px;text-align:center;max-width:76px;}
    .rk-sscore{font-size:.95rem;font-weight:900;color:var(--primary);}
    .rk-scls{font-size:.66rem;color:var(--text-muted);}
    .rk-block{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:rgba(255,255,255,.85);margin-top:6px;}
    .rk-s1 .rk-block{width:64px;height:54px;background:linear-gradient(180deg,#fbbf24,#f59e0b);}
    .rk-s2 .rk-block{width:54px;height:38px;background:linear-gradient(180deg,#94a3b8,#64748b);}
    .rk-s3 .rk-block{width:48px;height:28px;background:linear-gradient(180deg,#d97706,#b45309);}
    .rk-top10{display:flex;flex-direction:column;gap:7px;}
    .rk-t10{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1.5px solid var(--border);border-radius:11px;padding:9px 13px;cursor:pointer;transition:all .15s;}
    .rk-t10:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);transform:translateY(-1px);}
    .rk-t10.r1{border-color:#fbbf24;background:linear-gradient(90deg,#fffbeb,var(--surface2));}
    .rk-t10.r2{border-color:#94a3b8;}
    .rk-t10.r3{border-color:#d97706;background:linear-gradient(90deg,#fffbeb,var(--surface2));}
    .rk-t10-rk{width:26px;text-align:center;font-weight:900;font-size:.88rem;flex-shrink:0;}
    .rk-t10-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:.9rem;background:linear-gradient(135deg,var(--primary),#6366f1);}
    .rk-t10-info{flex:1;min-width:0;}
    .rk-t10-name{font-weight:700;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rk-t10-sub{font-size:.70rem;color:var(--text-muted);margin-top:1px;}
    .rk-t10-score{font-size:1rem;font-weight:900;color:var(--primary);flex-shrink:0;}
    .rk-filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
    .rk-filters select{padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-size:.80rem;color:var(--text);cursor:pointer;}
    .rk-filters input{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);font-size:.80rem;color:var(--text);flex:1;min-width:130px;}
    .rk-tbl-wrap{overflow-x:auto;}
    .rk-tbl{width:100%;border-collapse:collapse;font-size:.80rem;}
    .rk-tbl th{background:var(--surface);font-size:.70rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;white-space:nowrap;}
    .rk-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .rk-tbl tr:last-child td{border-bottom:none;}
    .rk-tbl tr:hover td{background:var(--surface);}
    .rk-tbl tr.t1 td{background:linear-gradient(90deg,rgba(251,191,36,.07),transparent);}
    .rk-tbl tr.t2 td{background:linear-gradient(90deg,rgba(148,163,184,.05),transparent);}
    .rk-tbl tr.t3 td{background:linear-gradient(90deg,rgba(217,119,6,.05),transparent);}
    .sp{display:inline-block;padding:2px 9px;border-radius:99px;font-weight:800;font-size:.78rem;}
    .sp.h{background:#dcfce7;color:#15803d;}.sp.m{background:#fef9c3;color:#92400e;}.sp.l{background:#fee2e2;color:#991b1b;}
    .rk-cls-item{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--border);}
    .rk-cls-item:last-child{border-bottom:none;}
    .rk-cls-name{font-weight:800;font-size:.88rem;width:36px;flex-shrink:0;}
    .rk-cls-bar{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
    .rk-cls-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s;}
    .rk-cls-avg{font-weight:900;font-size:.88rem;color:var(--primary);width:30px;flex-shrink:0;text-align:right;}
    .rk-cls-pass{font-size:.72rem;color:var(--text-muted);white-space:nowrap;}
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">📐</div>
      <div class="logo-text"><span class="logo-tagline">Ôn thi tuyển sinh với Thầy Trong !!!</span></div>
    </a>
    <nav class="nav">
      <a href="index.html"><span class="nav-emoji">🏠</span><span class="nav-label"> Làm bài</span></a>
      <a href="rank.html" class="active"><span class="nav-emoji">🏆</span><span class="nav-label"> Xếp hạng</span></a>
      <a href="upload.html" id="navUpload" style="display:none;"><span class="nav-emoji">📤</span><span class="nav-label"> Upload đề</span></a>
    </nav>
  </div>
</header>
<script>if(sessionStorage.getItem('teacher_auth')==='1')document.getElementById('navUpload').style.display='';</script>

<main class="main">

  <div class="rk-header">
    <h1>🏆 Bảng Xếp Hạng</h1>
    <p>Ôn thi tuyển sinh lớp 10 · Thầy Trong</p>
  </div>

  <!-- STATS -->
  <div class="rk-stats">
    <div class="rk-stat"><div class="rk-stat-num" id="sTotal">-</div><div class="rk-stat-lbl">Lượt làm bài</div></div>
    <div class="rk-stat"><div class="rk-stat-num" id="sAvg">-</div><div class="rk-stat-lbl">Điểm TB</div></div>
    <div class="rk-stat"><div class="rk-stat-num" id="sTop">-</div><div class="rk-stat-lbl">Cao nhất</div></div>
    <div class="rk-stat"><div class="rk-stat-num" id="sPass">-</div><div class="rk-stat-lbl">Đạt ≥ 5</div></div>
  </div>

  <!-- TOP 10 -->
  <div class="card mb-3">
    <div class="card-header" style="padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-weight:800;">🥇 Top 10 Cao Thủ</span>
      <div style="display:flex;gap:6px;margin-left:auto;">
        <button class="rk-tbtn active" id="tbWeek"  onclick="setTimeFilter('week')">Tuần</button>
        <button class="rk-tbtn"        id="tbMonth" onclick="setTimeFilter('month')">Tháng</button>
        <button class="rk-tbtn"        id="tbAll"   onclick="setTimeFilter('all')">Tất cả</button>
      </div>
    </div>
    <div class="card-body" style="padding:14px 16px;">
      <div id="rkLeaderboard"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- BẢNG KẾT QUẢ -->
  <div class="card mb-3">
    <div class="card-header" style="padding:12px 16px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;">
      <span style="font-weight:800;">📋 Tất cả kết quả</span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="rk-tbtn" onclick="loadRankings()">🔄</button>
        <button class="rk-tbtn" onclick="exportCSV()">📥 CSV</button>
      </div>
    </div>
    <div class="card-body" style="padding:12px 16px;">
      <div class="rk-filters">
        <select id="fClass" onchange="applyFilters()"><option value="">Tất cả lớp</option></select>
        <select id="fTopic" onchange="applyFilters()">
          <option value="">Tất cả chủ đề</option>
          <option value="dai-so">Đại số</option>
          <option value="hinh-hoc">Hình học</option>
          <option value="tong-hop">Tổng hợp</option>
        </select>
        <select id="fSort" onchange="applyFilters()">
          <option value="score">Điểm cao nhất</option>
          <option value="recent">Mới nhất</option>
          <option value="name">Theo tên</option>
        </select>
        <input id="fSearch" type="text" placeholder="🔍 Tìm tên học sinh..." oninput="applyFilters()">
      </div>
      <div id="rkTable"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- THỐNG KÊ THEO LỚP -->
  <div class="card mb-3">
    <div class="card-header" style="padding:12px 16px;"><span style="font-weight:800;">📊 Thống kê theo lớp</span></div>
    <div class="card-body" style="padding:4px 0;" id="rkClassStats">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

</main>

<div id="toastContainer" class="toast-container"></div>
<script src="app.js"></script>
<script>
let allResults = [];
let timeFilter = 'week';

function setTimeFilter(f) {
  timeFilter = f;
  ['Week','Month','All'].forEach(k => {
    const b = document.getElementById('tb'+k);
    if (b) b.className = 'rk-tbtn' + (k.toLowerCase()===f?' active':'');
  });
  renderLeaderboard(allResults);
}

function filterByTime(data, f) {
  const now = new Date();
  return data.filter(r => {
    if (f==='all') return true;
    const ts = new Date(r.timestamp);
    if (f==='week')  return ts >= new Date(now - 7*24*3600*1000);
    if (f==='month') return ts.getMonth()===now.getMonth() && ts.getFullYear()===now.getFullYear();
    return true;
  });
}

function renderLeaderboard(data) {
  const filtered = filterByTime(data, timeFilter);
  const bm = {};
  filtered.forEach(r => {
    const k = r.studentName+'_'+r.studentClass;
    if (!bm[k] || r.score>bm[k].score || (r.score===bm[k].score && r.timeTaken<bm[k].timeTaken)) bm[k]=r;
  });
  const top10 = Object.values(bm).sort((a,b)=>b.score-a.score||a.timeTaken-b.timeTaken).slice(0,10);
  const el = document.getElementById('rkLeaderboard');
  if (!el) return;
  if (!top10.length) { el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);">Chưa có dữ liệu trong khoảng này.</div>'; return; }

  // Podium
  let pod = '';
  if (top10.length >= 2) {
    const slots=[{r:top10[1],cls:'rk-s2',icon:'🥈'},{r:top10[0],cls:'rk-s1',icon:'🥇'}];
    if (top10[2]) slots.push({r:top10[2],cls:'rk-s3',icon:'🥉'});
    pod = '<div class="rk-podium">' + slots.map((s,i) =>
      '<div class="rk-slot '+s.cls+'" onclick="rankFirework('+(i===1?1:i===0?2:3)+',\''+s.r.studentName.replace(/'/g,"\\'")+'\')">'+
      '<div class="rk-av">'+s.r.studentName.charAt(0).toUpperCase()+'</div>'+
      '<div class="rk-sname">'+s.r.studentName+'</div>'+
      '<div class="rk-sscore">'+s.r.score+'</div>'+
      '<div class="rk-scls">'+s.r.studentClass+'</div>'+
      '<div class="rk-block">'+s.icon+'</div></div>'
    ).join('') + '</div>';
  }

  const medals=['🥇','🥈','🥉'];
  const list = '<div class="rk-top10">' + top10.map((r,i)=>{
    const rk=i+1;
    return '<div class="rk-t10 r'+rk+'"'+(rk<=3?' onclick="rankFirework('+rk+',\''+r.studentName.replace(/'/g,"\\'")+'\') "':'')+'>'+
      '<div class="rk-t10-rk">'+(rk<=3?medals[rk-1]:rk)+'</div>'+
      '<div class="rk-t10-av">'+r.studentName.charAt(0).toUpperCase()+'</div>'+
      '<div class="rk-t10-info"><div class="rk-t10-name">'+r.studentName+'</div>'+
      '<div class="rk-t10-sub">'+r.studentClass+' · '+renderRankBadge(r.score)+'</div></div>'+
      '<div class="rk-t10-score">'+r.score+'<span style="font-size:.62rem;color:var(--text-muted)">/10</span></div></div>';
  }).join('') + '</div>';

  el.innerHTML = pod + list;
}

async function loadRankings() {
  document.getElementById('rkTable').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  allResults = await fetchResults();
  if (!allResults.length) allResults = generateSampleResults();
  const cls=[...new Set(allResults.map(r=>r.studentClass).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'vi'));
  const sel=document.getElementById('fClass');
  if(sel) sel.innerHTML='<option value="">Tất cả lớp</option>'+cls.map(c=>'<option value="'+c+'">Lớp '+c+'</option>').join('');
  updateStats(allResults);
  renderLeaderboard(allResults);
  applyFilters();
  renderClassStats(allResults);
}

function updateStats(d) {
  const n=d.length, avg=n?(d.reduce((s,r)=>s+r.score,0)/n).toFixed(1):0;
  const top=n?Math.max(...d.map(r=>r.score)):0, pass=d.filter(r=>r.score>=5).length;
  document.getElementById('sTotal').textContent=n;
  document.getElementById('sAvg').textContent=avg;
  document.getElementById('sTop').textContent=top;
  document.getElementById('sPass').textContent=pass+' ('+(n?Math.round(pass/n*100):0)+'%)';
}

function applyFilters() {
  const fc=document.getElementById('fClass').value;
  const ft=document.getElementById('fTopic').value;
  const fs=document.getElementById('fSort').value;
  const q=document.getElementById('fSearch').value.toLowerCase();
  let d=allResults.filter(r=>(!fc||r.studentClass===fc)&&(!ft||r.topic===ft)&&(!q||r.studentName.toLowerCase().includes(q)));
  if(fs==='score') d.sort((a,b)=>b.score-a.score||a.timeTaken-b.timeTaken);
  else if(fs==='recent') d.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  else d.sort((a,b)=>a.studentName.localeCompare(b.studentName,'vi'));
  renderTable(d);
}

function renderTable(data) {
  const el=document.getElementById('rkTable');
  if(!el) return;
  if(!data.length){
    el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted);">Chưa có kết quả. <a href="index.html" class="btn btn-primary btn-sm" style="margin-left:8px;">Làm bài ngay</a></div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const rows=data.map((r,i)=>{
    const rk=i+1, sc=r.score>=8?'h':r.score>=5?'m':'l';
    const tm=Math.floor(r.timeTaken/60)+':'+String(r.timeTaken%60).padStart(2,'0');
    const dt=r.timestamp?new Date(r.timestamp).toLocaleDateString('vi-VN'):'-';
    const rc=rk===1?'t1':rk===2?'t2':rk===3?'t3':'';
    return '<tr class="'+rc+'"><td style="font-weight:800;text-align:center;">'+(rk<=3?medals[rk-1]:rk)+'</td>'+
      '<td><strong>'+r.studentName+'</strong></td>'+
      '<td><span class="class-badge">'+r.studentClass+'</span></td>'+
      '<td>'+renderRankBadge(r.score)+'</td>'+
      '<td style="color:var(--text-muted)">'+( r.topicName||'-')+'</td>'+
      '<td><span class="sp '+sc+'">'+r.score+'/10</span></td>'+
      '<td style="color:var(--text-muted)">'+r.correct+'/'+r.total+'</td>'+
      '<td style="color:var(--text-muted)">⏱ '+tm+'</td>'+
      '<td style="color:var(--text-muted);font-size:.76rem">'+dt+'</td></tr>';
  }).join('');
  el.innerHTML='<div class="rk-tbl-wrap"><table class="rk-tbl"><thead><tr>'+
    '<th>Hạng</th><th>Họ tên</th><th>Lớp</th><th>Danh hiệu</th><th>Chủ đề</th><th>Điểm</th><th>Đúng</th><th>Thời gian</th><th>Ngày</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<p style="text-align:right;font-size:.76rem;color:var(--text-muted);margin-top:6px;">'+data.length+' kết quả</p>';
}

function renderClassStats(data) {
  const map={};
  data.forEach(r=>{
    if(!map[r.studentClass]) map[r.studentClass]={n:0,sum:0,pass:0};
    map[r.studentClass].n++; map[r.studentClass].sum+=r.score;
    if(r.score>=5) map[r.studentClass].pass++;
  });
  const cls=Object.entries(map).sort((a,b)=>(b[1].sum/b[1].n)-(a[1].sum/a[1].n));
  const el=document.getElementById('rkClassStats');
  if(!el) return;
  if(!cls.length){el.innerHTML='<div style="text-align:center;padding:14px;color:var(--text-muted);">Chưa có dữ liệu</div>';return;}
  el.innerHTML=cls.map(([name,s])=>{
    const avg=(s.sum/s.n).toFixed(1), pct=Math.round(s.pass/s.n*100);
    const col=pct>=80?'#15803d':pct>=50?'#92400e':'#991b1b';
    return '<div class="rk-cls-item"><div class="rk-cls-name">'+name+'</div>'+
      '<div class="rk-cls-bar"><div class="rk-cls-fill" style="width:'+(parseFloat(avg)/10*100).toFixed(0)+'%"></div></div>'+
      '<div class="rk-cls-avg">'+avg+'</div>'+
      '<div class="rk-cls-pass" style="color:'+col+'">'+pct+'% đạt · '+s.n+' lượt</div></div>';
  }).join('');
}

function exportCSV() {
  if(!allResults.length){showToast('Chưa có dữ liệu!','warning');return;}
  const h=['Họ tên','Lớp','Chủ đề','Điểm','Câu đúng','Tổng','Thời gian(s)','Ngày'];
  const rows=allResults.map(r=>[r.studentName,r.studentClass,r.topicName||r.topic,r.score,r.correct,r.total,r.timeTaken,r.timestamp?new Date(r.timestamp).toLocaleDateString('vi-VN'):'']);
  const csv=[h,...rows].map(row=>row.map(c=>'"'+c+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='ketqua_'+new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')+'.csv';
  a.click(); showToast('Đã xuất CSV!','success');
}

function generateSampleResults() {
  const names=['Nguyễn Văn An','Trần Thị Bình','Lê Minh Châu','Phạm Quốc Dũng','Hoàng Thu Hà','Vũ Thanh Hưng','Đặng Thị Mai','Bùi Văn Nam','Đinh Thu Phương','Ngô Minh Quân'];
  const clss=['9A','9B','9C','9D','9A','9B','9C','9A','9B','9D'];
  const topics=['dai-so','hinh-hoc','tong-hop'];
  const tN={'dai-so':'Đại số','hinh-hoc':'Hình học','tong-hop':'Tổng hợp'};
  return names.map((name,i)=>{
    const t=topics[i%3],score=+(5+Math.random()*5).toFixed(1);
    return{studentName:name,studentClass:clss[i],topic:t,topicName:tN[t],score,correct:Math.round(score),total:10,timeTaken:300+Math.floor(Math.random()*900),timestamp:new Date(Date.now()-Math.random()*7*24*3600000).toISOString()};
  });
}

function rankFirework(rank, name) {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const now=ctx.currentTime;
    const colors=['#fbbf24','#10b981','#3b82f6','#f472b6','#a78bfa','#34d399','#fb923c'];
    const W=window.innerWidth,H=window.innerHeight;
    const pts=rank===1?[{x:W*.2,y:H*.3},{x:W*.8,y:H*.25},{x:W*.5,y:H*.15},{x:W*.15,y:H*.6},{x:W*.85,y:H*.55},{x:W*.5,y:H*.5}]:rank===2?[{x:W*.3,y:H*.3},{x:W*.7,y:H*.3},{x:W*.5,y:H*.2}]:[{x:W*.4,y:H*.4},{x:W*.6,y:H*.35}];
    pts.forEach((pt,bi)=>{
      setTimeout(()=>{
        for(let i=0;i<28;i++){
          const p=document.createElement('div');p.className='firework-particle';
          const a=(i/28)*360+Math.random()*10,dist=70+Math.random()*130,sz=5+Math.random()*8;
          p.style.cssText='left:'+pt.x+'px;top:'+pt.y+'px;width:'+sz+'px;height:'+sz+'px;background:'+colors[(i+bi*3)%colors.length]+';--dx:'+Math.cos(a*Math.PI/180)*dist+'px;--dy:'+Math.sin(a*Math.PI/180)*dist+'px;animation-duration:'+(0.6+Math.random()*.5)+'s;border-radius:'+(Math.random()>.5?'50%':'3px')+';position:fixed;z-index:9999;pointer-events:none;';
          document.body.appendChild(p);setTimeout(()=>p.remove(),1300);
        }
      },bi*130);
    });
    const notes=rank===1?[523,659,784,1047]:rank===2?[659,784,1047]:[523,659];
    notes.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.09,now+i*.12);g.gain.exponentialRampToValueAtTime(0.001,now+i*.12+.4);o.connect(g);g.connect(ctx.destination);o.start(now+i*.12);o.stop(now+i*.12+.45);});
    const msgs=['🥇 '+name+' — SỐ 1! Pháo hoa! 🎆','🥈 '+name+' — Hạng 2! Tuyệt! ✨','🥉 '+name+' — Hạng 3! Cố lên! 🎉'];
    showToast(msgs[rank-1]||'🎉 Xuất sắc!','success',3000);
  } catch(e){}
}

document.addEventListener('DOMContentLoaded',()=>{initFirebase();loadRankings();});
</script>
