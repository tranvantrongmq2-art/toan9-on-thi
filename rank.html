<script>
// ====================================================
// RANKING PAGE LOGIC
// ====================================================

let allResults = [];
let currentTimeFilter = 'week'; // 'week' | 'month' | 'all'

function setTimeFilter(filter) {
  currentTimeFilter = filter;
  ['week','month','all'].forEach(f => {
    const btn = document.getElementById('filter' + f.charAt(0).toUpperCase() + f.slice(1));
    if (btn) {
      btn.className = f === filter ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm';
    }
  });
  renderLeaderboard(allResults);
}

function filterByTime(data, filter) {
  const now = new Date();
  return data.filter(r => {
    if (filter === 'all') return true;
    const ts = new Date(r.timestamp);
    if (filter === 'week') {
      const weekAgo = new Date(now - 7 * 24 * 3600 * 1000);
      return ts >= weekAgo;
    }
    if (filter === 'month') {
      return ts.getMonth() === now.getMonth() && ts.getFullYear() === now.getFullYear();
    }
    return true;
  });
}

// Render Top 10 Leaderboard với podium
function renderLeaderboard(data) {
  const filtered = filterByTime(data, currentTimeFilter);
  // Lấy điểm cao nhất của mỗi học sinh
  const bestMap = {};
  filtered.forEach(r => {
    const key = r.studentName + '_' + r.studentClass;
    if (!bestMap[key] || r.score > bestMap[key].score) {
      bestMap[key] = r;
    }
  });
  const top10 = Object.values(bestMap)
    .sort((a, b) => b.score - a.score || a.timeTaken - b.timeTaken)
    .slice(0, 10);

  const el = document.getElementById('leaderboardContent');
  if (!el) return;

  if (top10.length === 0) {
    el.innerHTML = `<div class="alert alert-info">Chưa có dữ liệu trong khoảng thời gian này.</div>`;
    return;
  }

  // Podium top 3
  const podiumOrder = [top10[1], top10[0], top10[2]].filter(Boolean);
  const podiumClasses = top10[1] ? [2, 1, 3] : [1, 2, 3];
  const podiumIcons = ['🥈','🥇','🥉'];

  let podiumHtml = '';
  if (top10.length >= 2) {
    const slots = [
      { data: top10[1], pos: 2, icon: '🥈', blockClass: 'podium-2' },
      { data: top10[0], pos: 1, icon: '🥇', blockClass: 'podium-1' },
    ];
    if (top10[2]) slots.push({ data: top10[2], pos: 3, icon: '🥉', blockClass: 'podium-3' });

    podiumHtml = `
      <div class="leaderboard-podium">
        ${slots.map(s => `
          <div class="podium-slot ${s.blockClass}" onclick="rankFirework(${s.pos},'${s.data.studentName.replace(/'/g,"\\'")}')" style="cursor:pointer;" title="Chạm để chúc mừng!">
            <div class="podium-avatar">${s.data.studentName.charAt(0).toUpperCase()}</div>
            <div class="podium-name">${s.data.studentName}</div>
            <div class="podium-score">${s.data.score}</div>
            <div class="podium-block">${s.icon}</div>
            <div style="font-size:0.6rem;color:#6366f1;animation:hint-pulse 1.8s ease-in-out infinite;margin-top:4px;">👆 Chạm!</div>
          </div>
        `).join('')}
      </div>`;
  }

  // Top 10 list
  const medals = ['🥇','🥈','🥉'];
  const listHtml = top10.map((r, i) => {
    const rank = i + 1;
    const rankInfo = getRank(r.score);
    const clickAttr = rank <= 3
      ? `onclick="rankFirework(${rank},'${r.studentName.replace(/'/g,"\\'")}') " style="cursor:pointer;" title="Chạm để chúc mừng!"`
      : '';
    return `
      <div class="top10-item" ${clickAttr}>
        <div class="top10-rank">${rank <= 3 ? medals[rank-1] : rank}</div>
        <div>
          <div class="top10-name">${r.studentName}</div>
          <div class="top10-class">${r.studentClass} · ${renderRankBadge(r.score)}</div>
        </div>
        <div class="top10-score">${r.score}<span style="font-size:0.7rem;color:var(--text-muted)">/10</span></div>
      </div>
    `;
  }).join('');

  el.innerHTML = podiumHtml + `<div class="top10-list">${listHtml}</div>`;
}



// Load dữ liệu
async function loadRankings() {
  document.getElementById('rankContent').innerHTML = `
    <div class="loading"><div class="spinner"></div><p>Đang tải...</p></div>
  `;

  allResults = await fetchResults();

  if (allResults.length === 0) {
    allResults = generateSampleResults();
  }

  // Cập nhật danh sách lớp động từ dữ liệu thực
  populateClassFilter(allResults);

  updateStats(allResults);
  renderLeaderboard(allResults);
  applyFilters();
  renderClassStats(allResults);
}

// Tạo danh sách lớp động từ dữ liệu
function populateClassFilter(data) {
  const classes = [...new Set(data.map(r => r.studentClass).filter(Boolean))].sort((a,b) => a.localeCompare(b,'vi'));
  const sel = document.getElementById('filterClass');
  if (!sel) return;
  sel.innerHTML = '<option value="">📚 Tất cả lớp</option>' +
    classes.map(c => `<option value="${c}">Lớp ${c}</option>`).join('');
}

// Xóa 1 kết quả
async function deleteResult(id, name) {
  if (!confirm(`Xóa kết quả của "${name}"?`)) return;

  if (AppState.useFirebase && AppState.db && !id.startsWith('__idx__')) {
    // Xóa trên Firebase bằng document id
    try {
      await AppState.db.collection('results').doc(id).delete();
      showToast(`Đã xóa kết quả của ${name}`, 'success');
      loadRankings();
    } catch(e) {
      showToast('Lỗi khi xóa: ' + e.message, 'error');
    }
  } else {
    // Xóa trong localStorage bằng index
    let results = JSON.parse(localStorage.getItem('quiz_results') || '[]');
    if (id.startsWith('__idx__')) {
      const idx = parseInt(id.replace('__idx__',''));
      results.splice(idx, 1);
    } else {
      results = results.filter(r => r.id !== id);
    }
    localStorage.setItem('quiz_results', JSON.stringify(results));
    showToast(`Đã xóa kết quả của ${name}`, 'success');
    loadRankings();
  }
}

// Tạo dữ liệu mẫu demo
function generateSampleResults() {
  const names = ['Nguyễn Văn An','Trần Thị Bình','Lê Minh Châu','Phạm Quốc Dũng',
                 'Hoàng Thu Hà','Vũ Thanh Hưng','Đặng Thị Mai','Bùi Văn Nam',
                 'Đinh Thu Phương','Ngô Minh Quân'];
  const classes = ['9A','9B','9C','9D','9A','9B','9C','9A','9B','9D'];
  const topics = ['dai-so','hinh-hoc','tong-hop'];
  const topicNames = {'dai-so':'Đại số','hinh-hoc':'Hình học','tong-hop':'Tổng hợp'};

  return names.map((name, i) => {
    const topic = topics[i % 3];
    const score = +(5 + Math.random() * 5).toFixed(1);
    const correct = Math.round(score);
    return {
      studentName: name,
      studentClass: classes[i],
      topic: topic,
      topicName: topicNames[topic],
      score: score,
      correct: correct,
      total: 10,
      timeTaken: 300 + Math.floor(Math.random() * 900),
      timestamp: new Date(Date.now() - Math.random() * 7 * 24 * 3600000).toISOString()
    };
  });
}

// Cập nhật thống kê tổng quan
function updateStats(data) {
  const total = data.length;
  const avg = total > 0 ? (data.reduce((s, r) => s + r.score, 0) / total).toFixed(1) : 0;
  const top = total > 0 ? Math.max(...data.map(r => r.score)) : 0;
  const pass = data.filter(r => r.score >= 5).length;

  document.getElementById('statStudents').textContent = total;
  document.getElementById('statAvg').textContent = avg;
  document.getElementById('statTop').textContent = top;
  document.getElementById('statPass').textContent = `${pass} (${total > 0 ? Math.round(pass/total*100) : 0}%)`;
}

// Áp dụng bộ lọc và render
function applyFilters() {
  const filterClass = document.getElementById('filterClass').value;
  const filterTopic = document.getElementById('filterTopic').value;
  const filterSort = document.getElementById('filterSort').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allResults.filter(r => {
    if (filterClass && r.studentClass !== filterClass) return false;
    if (filterTopic && r.topic !== filterTopic) return false;
    if (search && !r.studentName.toLowerCase().includes(search)) return false;
    return true;
  });

  // Sort
  if (filterSort === 'score') {
    filtered.sort((a, b) => b.score - a.score || a.timeTaken - b.timeTaken);
  } else if (filterSort === 'recent') {
    filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  } else if (filterSort === 'name') {
    filtered.sort((a, b) => a.studentName.localeCompare(b.studentName, 'vi'));
  }

  renderTable(filtered);
}

// Render bảng xếp hạng
function renderTable(data) {
  const rankContent = document.getElementById('rankContent');

  if (data.length === 0) {
    rankContent.innerHTML = `
      <div class="alert alert-info">
        Chưa có dữ liệu. Hãy làm bài thi trước nhé! 
        <a href="index.html" class="btn btn-primary btn-sm" style="margin-left:12px;">Làm bài ngay</a>
      </div>
    `;
    return;
  }

  const medals = ['🥇','🥈','🥉'];

  const rows = data.map((r, i) => {
    const rank = i + 1;
    const scoreClass = r.score >= 8 ? 'high' : r.score >= 5 ? 'mid' : 'low';
    const time = `${Math.floor(r.timeTaken/60)}:${(r.timeTaken%60).toString().padStart(2,'0')}`;
    const date = r.timestamp ? new Date(r.timestamp).toLocaleDateString('vi-VN') : '-';
    // Dùng id nếu có (Firebase), fallback về index (localStorage)
    const rid = r.id || `__idx__${i}`;
    const safeName = r.studentName.replace(/'/g,"\\'");

    return `
      <tr class="${rank <= 3 ? `rank-${rank}` : ''}">
        <td class="rank-num">
          ${rank <= 3 ? `<span class="rank-medal">${medals[rank-1]}</span>` : rank}
        </td>
        <td><strong>${r.studentName}</strong></td>
        <td><span class="class-badge">${r.studentClass}</span></td>
        <td><span style="font-size:0.85rem;color:var(--text-muted)">${r.topicName || '-'}</span></td>
        <td>${renderRankBadge(r.score)}</td>
        <td><span class="score-pill ${scoreClass}">${r.score} / 10</span></td>
        <td style="font-size:0.85rem;color:var(--text-muted)">${r.correct}/${r.total} câu</td>
        <td style="font-size:0.85rem;color:var(--text-muted)">⏱️ ${time}</td>
        <td style="font-size:0.8rem;color:var(--text-muted)">${date}</td>
        <td><button onclick="deleteResult('${rid}','${safeName}')" class="btn-delete-result" title="Xóa">🗑️</button></td>
      </tr>
    `;
  }).join('');

  rankContent.innerHTML = `
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th>Hạng</th>
            <th>Họ và tên</th>
            <th>Lớp</th>
            <th>Chủ đề</th>
            <th>Danh hiệu</th>
            <th>Điểm</th>
            <th>Số câu đúng</th>
            <th>Thời gian</th>
            <th>Ngày</th>
            <th>Xóa</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p style="text-align:right;font-size:0.82rem;color:var(--text-muted);margin-top:10px;">
      Hiển thị ${data.length} kết quả
    </p>
  `;
}

// Thống kê theo lớp
function renderClassStats(data) {
  const classMap = {};
  data.forEach(r => {
    if (!classMap[r.studentClass]) {
      classMap[r.studentClass] = { count: 0, totalScore: 0, pass: 0 };
    }
    classMap[r.studentClass].count++;
    classMap[r.studentClass].totalScore += r.score;
    if (r.score >= 5) classMap[r.studentClass].pass++;
  });

  const classes = Object.entries(classMap).sort((a, b) => {
    const avgA = a[1].totalScore / a[1].count;
    const avgB = b[1].totalScore / b[1].count;
    return avgB - avgA;
  });

  if (classes.length === 0) {
    document.getElementById('classStats').innerHTML = '<p class="text-muted text-center">Chưa có dữ liệu</p>';
    return;
  }

  const rows = classes.map(([cls, stats]) => {
    const avg = (stats.totalScore / stats.count).toFixed(1);
    const passRate = Math.round(stats.pass / stats.count * 100);
    const barWidth = (parseFloat(avg) / 10 * 100).toFixed(0);

    return `
      <tr>
        <td><span class="class-badge" style="font-size:1rem;">${cls}</span></td>
        <td>${stats.count} lượt</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;">
              <div style="width:${barWidth}%;height:100%;background:var(--primary);border-radius:99px;"></div>
            </div>
            <strong>${avg}</strong>
          </div>
        </td>
        <td>
          <span style="color:${passRate >= 80 ? 'var(--success)' : passRate >= 50 ? 'var(--secondary-dark)' : 'var(--danger)'};">
            ${passRate}%
          </span>
        </td>
        <td style="font-size:0.85rem;color:var(--text-muted)">${stats.pass}/${stats.count} HS</td>
      </tr>
    `;
  }).join('');

  document.getElementById('classStats').innerHTML = `
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th>Lớp</th>
            <th>Lượt làm bài</th>
            <th>Điểm TB</th>
            <th>Tỷ lệ đạt (≥5)</th>
            <th>Số HS đạt</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// Xuất CSV
function exportCSV() {
  if (allResults.length === 0) {
    showToast('Chưa có dữ liệu để xuất!', 'warning');
    return;
  }

  const headers = ['Họ tên','Lớp','Chủ đề','Điểm','Câu đúng','Tổng câu','Thời gian (giây)','Ngày làm'];
  const rows = allResults.map(r => [
    r.studentName,
    r.studentClass,
    r.topicName || r.topic,
    r.score,
    r.correct,
    r.total,
    r.timeTaken,
    r.timestamp ? new Date(r.timestamp).toLocaleDateString('vi-VN') : ''
  ]);

  const csv = [headers, ...rows]
    .map(row => row.map(cell => `"${cell}"`).join(','))
    .join('\n');

  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `ketqua_toan9_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
  link.click();
  showToast('Đã xuất file CSV thành công!', 'success');
}

// PHÁO HOA BẢNG XẾP HẠNG
// ====================================================
function rankFirework(rank, name) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;

  if (rank === 1) {
    // 🥇 HẠNG 1: Pháo hoa KHẮP MÀN HÌNH — 8 đợt nổ liên tiếp + fanfare hoành tráng
    const colors = ['#fbbf24','#fef08a','#f59e0b','#fff','#f43f5e','#a78bfa','#34d399','#38bdf8','#fb923c'];
    const W = window.innerWidth, H = window.innerHeight;

    // 8 điểm nổ phủ kín màn hình
    const points = [
      {x:W*.1, y:H*.2}, {x:W*.9, y:H*.2},
      {x:W*.5, y:H*.1}, {x:W*.25,y:H*.45},
      {x:W*.75,y:H*.45},{x:W*.15,y:H*.7},
      {x:W*.85,y:H*.7}, {x:W*.5, y:H*.55},
    ];
    points.forEach((pt, bi) => {
      setTimeout(() => {
        for (let i = 0; i < 40; i++) {
          const p = document.createElement('div');
          p.className = 'firework-particle';
          const angle = (i/40)*360 + Math.random()*9;
          const dist = 70 + Math.random()*160;
          const size = 5 + Math.random()*9;
          p.style.cssText = `left:${pt.x}px;top:${pt.y}px;width:${size}px;height:${size}px;
            background:${colors[(i+bi*4)%colors.length]};
            --dx:${Math.cos(angle*Math.PI/180)*dist}px;
            --dy:${Math.sin(angle*Math.PI/180)*dist}px;
            animation-duration:${0.7+Math.random()*0.7}s;
            border-radius:${Math.random()>.4?'50%':'3px'};
            position:fixed;z-index:9999;pointer-events:none;`;
          document.body.appendChild(p);
          setTimeout(()=>p.remove(), 1600);
        }
      }, bi * 180);
    });

    // Đợt thứ 2 sau 1.5s — mưa sao từ trên xuống
    setTimeout(() => {
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'firework-particle';
          const x = Math.random() * W;
          const size = 4 + Math.random()*8;
          p.style.cssText = `left:${x}px;top:-10px;width:${size}px;height:${size}px;
            background:${colors[i%colors.length]};
            --dx:${(Math.random()-.5)*60}px;--dy:${100+Math.random()*250}px;
            animation-duration:${0.8+Math.random()*0.6}s;
            border-radius:50%;position:fixed;z-index:9999;pointer-events:none;`;
          document.body.appendChild(p);
          setTimeout(()=>p.remove(), 1600);
        }, i * 20);
      }
    }, 1500);

    // Âm thanh: fanfare kèn hoành tráng nhiều lớp
    // Lớp 1: chord fanfare
    [[523,0],[659,0],[784,0],[1047,0.05]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square'; o.frequency.value=f;
      g.gain.setValueAtTime(0,now+t);
      g.gain.linearRampToValueAtTime(0.12,now+t+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,now+t+0.5);
      o.connect(g);g.connect(ctx.destination);
      o.start(now+t);o.stop(now+t+0.55);
    });
    // Lớp 2: giai điệu thăng tiến
    [[523,.3],[587,.45],[659,.6],[784,.75],[1047,.9],[1319,1.1]].forEach(([f,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth'; o.frequency.value=f;
      g.gain.setValueAtTime(0,now+t);
      g.gain.linearRampToValueAtTime(0.09,now+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,now+t+0.28);
      o.connect(g);g.connect(ctx.destination);
      o.start(now+t);o.stop(now+t+0.32);
    });
    // Lớp 3: trống bass thình thịch
    [0, 0.35, 0.7, 1.05].forEach(t=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.2));
      const src=ctx.createBufferSource(),g=ctx.createGain();
      const flt=ctx.createBiquadFilter();
      flt.type='lowpass';flt.frequency.value=150;
      src.buffer=buf;
      g.gain.setValueAtTime(0.7,now+t);
      g.gain.exponentialRampToValueAtTime(0.001,now+t+0.18);
      src.connect(flt);flt.connect(g);g.connect(ctx.destination);
      src.start(now+t);
    });

    showToast(`🥇🎊 XUẤT SẮC! ${name} đứng đầu bảng! Quá tuyệt vời! 🎆`, 'success', 4000);
  }
  else if (rank === 2) {
    // 🥈 Hạng 2: Xoáy ốc + chuông trong
    const colors=['#e2e8f0','#94a3b8','#7dd3fc','#38bdf8','#fff','#a5f3fc'];
    const cx=window.innerWidth/2, cy=window.innerHeight*.4;
    for(let i=0;i<70;i++){
      setTimeout(()=>{
        const p=document.createElement('div');
        p.className='firework-particle';
        const angle=(i/70)*720;
        const dist=30+(i/70)*170;
        const size=4+Math.random()*7;
        p.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;
          background:${colors[i%colors.length]};
          --dx:${Math.cos(angle*Math.PI/180)*dist}px;
          --dy:${Math.sin(angle*Math.PI/180)*dist-90}px;
          animation-duration:${0.8+Math.random()*0.5}s;
          border-radius:50%;position:fixed;z-index:9999;pointer-events:none;`;
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1500);
      }, i*14);
    }
    // Chuông ngân 3 nốt
    [880,1108,1320,1760].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0.18,now+i*.2);
      g.gain.exponentialRampToValueAtTime(0.001,now+i*.2+1.4);
      o.connect(g);g.connect(ctx.destination);
      o.start(now+i*.2);o.stop(now+i*.2+1.5);
    });
    showToast(`🥈✨ Tuyệt vời! ${name} xếp hạng 2! 🌟`, 'success', 3500);
  }
  else {
    // 🥉 Hạng 3: Mưa sao vui + giai điệu bouncy
    const colors=['#f97316','#fb923c','#fdba74','#10b981','#34d399','#a78bfa','#f43f5e'];
    for(let i=0;i<70;i++){
      setTimeout(()=>{
        const p=document.createElement('div');
        p.className='firework-particle';
        const x=Math.random()*window.innerWidth;
        const size=4+Math.random()*8;
        p.style.cssText=`left:${x}px;top:-10px;width:${size}px;height:${size}px;
          background:${colors[i%colors.length]};
          --dx:${(Math.random()-.5)*80}px;--dy:${80+Math.random()*220}px;
          animation-duration:${0.7+Math.random()*0.6}s;
          border-radius:${Math.random()>.5?'50%':'3px'};
          position:fixed;z-index:9999;pointer-events:none;`;
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1500);
      }, i*18);
    }
    [392,494,587,698,784,880].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.13,now+i*.1);
      g.gain.exponentialRampToValueAtTime(0.001,now+i*.1+0.28);
      o.connect(g);g.connect(ctx.destination);
      o.start(now+i*.1);o.stop(now+i*.1+0.32);
    });
    showToast(`🥉🎉 Giỏi lắm! ${name} xếp hạng 3! Cố lên!`, 'success', 3000);
  }
}
</script>
</body>
</html>
